# Orbservability exporter — local development fallback.
#
# In production, tenants replace this file with a remote config layer:
#
#   export ORBSERVABILITY_TOKEN="<tenant_id>.<hmac_signature>"
#   otelcol --config=/etc/otelcol-config.yml \
#           --config=https://orbservability.com/api/v1/ingest/${ORBSERVABILITY_TOKEN}
#
# The collector fetches tenant-scoped YAML (with ClickHouse credentials)
# and merges it as the final layer — no local secrets, no proxy hop.

exporters:
  clickhouse/orbservability:
    endpoint: tcp://${env:ORBSERVABILITY_CH_HOST:-host.docker.internal}:9000?dial_timeout=10s
    database: ${env:ORBSERVABILITY_CH_DATABASE:-otel}
    username: ${env:ORBSERVABILITY_CH_USER:-default}
    password: ${env:ORBSERVABILITY_CH_PASSWORD:-orbservability}
    create_schema: true
    logs_table_name: otel_logs
    traces_table_name: otel_traces

service:
  pipelines:
    traces:
      exporters: [debug, span_metrics, clickhouse/orbservability]
    metrics:
      receivers: [docker_stats, http_check/frontend-proxy, host_metrics, nginx, otlp, redis, postgresql, prometheus/ad, span_metrics]
      exporters: [debug, clickhouse/orbservability]
    logs:
      exporters: [debug, clickhouse/orbservability]
