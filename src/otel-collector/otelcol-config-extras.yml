# Extras/customization layer for the OTel Collector.
# Exports all signals to the ClickHouse instance running in the orbservability monorepo.

exporters:
  clickhouse:
    endpoint: tcp://host.docker.internal:9000?dial_timeout=10s
    database: otel
    create_schema: true
    logs:
      table_name: otel_logs
    traces:
      table_name: otel_traces
    metrics:
      table_name: otel_metrics

service:
  pipelines:
    traces:
      exporters: [debug, span_metrics, clickhouse]
    metrics:
      receivers: [docker_stats, http_check/frontend-proxy, host_metrics, nginx, otlp, redis, postgresql, prometheus/ad, span_metrics]
      exporters: [debug, clickhouse]
    logs:
      exporters: [debug, clickhouse]
