# Orbservability extras: flag-admin sidecar + collector config.

services:
  flag-admin:
    build:
      context: ./src/flag-admin
      dockerfile_inline: |
        FROM node:24-slim
        WORKDIR /app
        COPY package.json ./
        RUN npm install
        COPY . .
        CMD ["npx", "tsx", "index.ts"]
    container_name: flag-admin
    ports:
      - "8090:8090"
    environment:
      - FLAG_FILE=/flags/demo.flagd.json
      - PORT=8090
    volumes:
      - ./src/flagd:/flags
    restart: unless-stopped
